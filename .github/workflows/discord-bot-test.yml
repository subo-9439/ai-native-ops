name: discord-bot-test

on:
  push:
    paths:
      - 'discord-bot/**'
      - '.github/workflows/discord-bot-test.yml'
  pull_request:
    paths:
      - 'discord-bot/**'
      - '.github/workflows/discord-bot-test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check (node --check)
        run: |
          set -e
          for f in index.js work-queue.js sync-poller.js sync-writer.js queue-watchdog.js \
                   alerts-watcher.js health-watcher.js \
                   lib/safe-send.js lib/health-check.js lib/render-status.js; do
            if [ -f "$f" ]; then
              echo "node --check $f"
              node --check "$f"
            fi
          done

      - name: safe-send 가드 회귀 테스트
        run: node test/safe-send.test.js

      - name: 봇 자가진단 단위 테스트
        run: node test/health-check.test.js
