# adapter-contract.yaml — Capability 기반 어댑터 계약
# 하네스가 실행 환경에 요구하는 최소 능력과 출력 형식을 정의한다.

version: "1.0.0"

capabilities:
  hooks:
    description: "PreToolUse/PostToolUse 등 이벤트 hook 등록 및 실행"
    required: false
    fallback: "rules_only 모드로 전환"

  file_read:
    description: "저장소 내 파일 읽기"
    required: true
    fallback: "없으면 하네스 실행 불가"

  file_write:
    description: "저장소 내 파일 쓰기"
    required: false
    fallback: "manual 모드 — stdout으로 내용 출력"

  shell:
    description: "셸 명령 실행"
    required: false
    fallback: "file_read/file_write만으로 동작"

  git:
    description: "git 명령 실행 (status, diff, commit)"
    required: false
    fallback: "커밋/푸시 없이 파일만 생성"

  network:
    description: "외부 네트워크 접근"
    required: false
    fallback: "오프라인 모드 — 로컬 파일만 참조"

  schema_validate:
    description: "JSON Schema 검증 (draft 2020-12)"
    required: false
    fallback: "relaxed 모드 — 검증 skip, 경고 기록"

  lock:
    description: "파일 기반 잠금 (동시 실행 방지)"
    required: false
    fallback: "report_only 모드로 전환"

  atomic_write:
    description: "원자적 파일 쓰기 (temp → rename)"
    required: false
    fallback: "일반 write로 대체"

  report_write:
    description: "실행 보고서 파일 생성"
    required: false
    fallback: "stdout으로 보고서 출력"

  confirm_ui:
    description: "사용자 승인 UI (approval gate)"
    required: false
    fallback: "propose_only 모드 — 제안만 하고 적용 안 함"

outputs:
  report_fields:
    run_id:
      type: string
      description: "실행 고유 ID (UUID v4)"
    detected_product:
      type: string
      description: "감지된 프로젝트 유형"
      example: "flutter-springboot-monorepo"
    automation_level:
      type: string
      enum: ["full", "semi", "manual", "report_only"]
      description: "자동화 수준"
    installed_hooks:
      type: array
      items: string
      description: "등록된 hook 목록"
    files_written:
      type: array
      items: string
      description: "생성/수정된 파일 경로 목록"
    failures:
      type: array
      items:
        code: string
        message: string
        file: string
      description: "실패 목록"
    degraded_mode:
      type: string
      enum: ["none", "rules_only", "manual", "report_only", "relaxed"]
      description: "현재 degraded 모드"
    next_manual_steps:
      type: array
      items: string
      description: "사람이 수행해야 할 후속 조치"
