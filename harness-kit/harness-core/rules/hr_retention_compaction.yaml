# hr_retention_compaction.yaml — 메모리 보존 및 압축 규칙

version: "1.0.0"

description: |
  raw/current 메모리 파일의 관리 규칙.
  retention.yaml 정책을 구체적 절차로 정의한다.

raw_management:
  path: ".agent/harness/memory/raw/"
  tracked_by_git: false
  files:
    events.jsonl:
      description: "모든 hook 이벤트 로그"
      rotation:
        max_size_mb: 10
        max_lines: 50000
        action: "events.{YYYY-MM-DD}.jsonl.bak으로 이동"
      retention_days: 30

    config_audit.jsonl:
      description: "설정 변경 감사 로그"
      rotation:
        max_size_mb: 5
        max_lines: 10000
        action: "config_audit.{YYYY-MM-DD}.jsonl.bak으로 이동"
      retention_days: 90

current_management:
  path: ".agent/harness/memory/current/"
  tracked_by_git: true
  files:
    lessons.current.json:
      description: "축적된 교훈/패턴"
      compaction_source: "raw/events.jsonl에서 반복 패턴 추출"

    rule_candidates.current.json:
      description: "규칙 후보 목록"
      compaction_source: "세션에서 발견된 개선점"

    harness_summary.md:
      description: "하네스 현재 상태 요약 (compaction 후 재주입용)"
      max_length_chars: 1500

compaction_procedure:
  trigger:
    - "raw/events.jsonl > 5000 라인"
    - "수동 요청: '하네스 compaction 실행'"
    - "릴리즈 전 체크리스트"
  steps:
    - step: 1
      action: "raw/events.jsonl에서 deny/error/warning 이벤트 추출"
    - step: 2
      action: "반복 패턴을 lessons.current.json에 추가"
    - step: 3
      action: "새 규칙 후보를 rule_candidates.current.json에 추가 (draft 상태)"
    - step: 4
      action: "harness_summary.md 갱신"
    - step: 5
      action: "raw 파일 rotation 실행"
  preserve:
    - "기존 stable 상태의 lessons/candidates"
    - "version, updated_at 필드"
